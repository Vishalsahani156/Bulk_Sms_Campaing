# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo in Render Dashboard → New Blueprint → select this file.

services:
  - type: web
    name: pulse-sms-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: bun install && bun run build
    preDeployCommand: bun run db:migrate:prod
    startCommand: bun run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: APP_FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-sms-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SMS_PROVIDER
        value: mock
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

  - type: worker
    name: pulse-sms-worker
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: bun install && bun run build
    startCommand: bun run start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-sms-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        fromService:
          name: pulse-sms-api
          type: web
          envVarKey: JWT_ACCESS_SECRET
      - key: JWT_REFRESH_SECRET
        fromService:
          name: pulse-sms-api
          type: web
          envVarKey: JWT_REFRESH_SECRET
      - key: SMS_PROVIDER
        fromService:
          name: pulse-sms-api
          type: web
          envVarKey: SMS_PROVIDER

databases:
  - name: pulse-sms-db
    plan: free
    databaseName: pulse_sms
    user: pulse
